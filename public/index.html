<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighter Page</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <meta
      name="description"
      content="A lightweight homepage with Google search, grouped bookmarks, and a calm blue layout."
    />
    <link rel="stylesheet" href="./styles.css?v=20260306-3" />
  </head>
  <body>
    <div class="page-shell" id="app-shell">
      <main class="page-content">
        <section class="hero" aria-labelledby="page-title">
          <h1 id="page-title">Lighter Page</h1>

          <form class="search-form" id="search-form" novalidate>
            <label class="sr-only" for="search-input">Google Search</label>
            <input
              id="search-input"
              name="q"
              type="search"
              placeholder="Use Google Search"
              autocomplete="off"
              enterkeyhint="search"
            />
            <button type="submit">Search</button>
          </form>
        </section>

        <section class="bookmarks-section" aria-labelledby="bookmarks-title">
          <div class="section-heading">
            <div class="section-title-block">
              <h2 id="bookmarks-title">Bookmarks</h2>
              <p id="bookmark-source-status" class="bookmark-source-status" aria-live="polite"></p>
            </div>
            <div class="section-tools" aria-label="Bookmark Tools">
              <input id="import-file-input" type="file" accept="application/json,.json" hidden />
              <button type="button" class="toolbar-button" id="import-button" aria-label="Import Bookmarks" title="Import Bookmarks"></button>
              <button type="button" class="toolbar-button" id="export-button" aria-label="Export Bookmarks" title="Export Bookmarks"></button>
              <button type="button" class="toolbar-button" id="reset-button" aria-label="Restore Defaults" title="Restore Defaults"></button>
              <button type="button" class="toolbar-button" id="settings-button" aria-label="Page Settings" title="Page Settings"></button>
              <button type="button" class="toolbar-button is-primary" id="add-group-button" aria-label="New Group" title="New Group"></button>
            </div>
          </div>

          <div class="section-subbar">
            <p id="bookmark-status" class="bookmark-status" aria-live="polite"></p>
            <label class="filter-field" for="bookmark-filter">
              <span class="sr-only">Filter Bookmarks</span>
              <input id="bookmark-filter" type="search" placeholder="Filter Bookmarks" autocomplete="off" />
            </label>
          </div>

          <div
            id="bookmark-feedback"
            class="bookmark-feedback"
            role="status"
            aria-live="polite"
          ></div>
          <div id="bookmark-groups" class="bookmark-groups"></div>
        </section>
      </main>
    </div>

    <div class="dialog-backdrop hidden" id="editor-backdrop" aria-hidden="true">
      <section
        class="editor-dialog"
        id="editor-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="editor-title"
      >
        <div class="editor-header">
          <h3 id="editor-title">Edit</h3>
          <button type="button" class="icon-button" id="close-editor-button" aria-label="Close"></button>
        </div>
        <form id="editor-form" class="editor-form" novalidate>
          <div id="editor-fields" class="editor-fields"></div>
          <p id="editor-error" class="editor-error" role="alert"></p>
          <div class="editor-actions">
            <button type="button" class="ghost-button" id="cancel-editor-button">Cancel</button>
            <button type="submit" class="primary-button" id="save-editor-button">Save</button>
          </div>
        </form>
      </section>
    </div>

    <div class="dialog-backdrop hidden" id="settings-backdrop" aria-hidden="true">
      <section
        class="editor-dialog settings-dialog"
        id="settings-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-title"
      >
        <div class="editor-header">
          <h3 id="settings-title">Page Settings</h3>
          <button type="button" class="icon-button" id="close-settings-button" aria-label="Close"></button>
        </div>
        <form id="settings-form" class="editor-form" novalidate>
          <div class="settings-grid">
            <label class="toggle-field">
              <input id="setting-show-favicons" name="showFavicons" type="checkbox" />
              <span>
                <strong>Show Favicons</strong>
                <small>Display site icons for bookmarks</small>
              </span>
            </label>
            <label class="toggle-field">
              <input id="setting-performance-mode" name="performanceMode" type="checkbox" />
              <span>
                <strong>Performance Mode</strong>
                <small>Reduce expensive motion and visual effects</small>
              </span>
            </label>
            <label class="toggle-field">
              <input id="setting-show-animations" name="showAnimations" type="checkbox" />
              <span>
                <strong>Enable Animations</strong>
                <small>Turn on entrance and transition animations</small>
              </span>
            </label>
            <label class="toggle-field">
              <input id="setting-hide-scrollbars" name="hideScrollbars" type="checkbox" />
              <span>
                <strong>Hide Scrollbars</strong>
                <small>Keep scrolling available while hiding scrollbars</small>
              </span>
            </label>
          </div>
          <div class="editor-actions">
            <button type="button" class="ghost-button" id="cancel-settings-button">Cancel</button>
            <button type="submit" class="primary-button" id="save-settings-button">Save Settings</button>
          </div>
        </form>
      </section>
    </div>

    <div class="dialog-backdrop hidden" id="confirm-backdrop" aria-hidden="true">
      <section
        class="confirm-dialog"
        id="confirm-dialog"
        role="alertdialog"
        aria-modal="true"
        aria-labelledby="confirm-title"
        aria-describedby="confirm-message"
      >
        <div class="editor-header">
          <h3 id="confirm-title">Please Confirm</h3>
        </div>
        <p id="confirm-message" class="confirm-message"></p>
        <div class="editor-actions">
          <button type="button" class="ghost-button" id="confirm-cancel-button">Cancel</button>
          <button type="button" class="primary-button" id="confirm-accept-button">Confirm</button>
        </div>
      </section>
    </div>

    <noscript>
      <div class="noscript-banner">JavaScript is required to load bookmark groups.</div>
    </noscript>

    <script src="./app.js?v=20260306-3" defer></script>
  </body>
</html>
